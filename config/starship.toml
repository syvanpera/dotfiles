format = """
[в•ӯв”Җ](fg:current_line)\
$os\
$directory\
$git_branch\
$fill\
$nodejs\
$dotnet\
$python\
$java\
$c\
$cmd_duration\
[в”ҖоӘј ](fg:bold current_line)\
$line_break\
$character\
"""

palette = 'dracula'
add_newline = true

[palettes.dracula]
foreground = '#F8F8F2'
background = '#282A36'
current_line = '#44475A'
primary = '#1E1F29'
box = '#44475A'
blue	= '#7AA2F7'
cyan = '#7DCFFF'
green	= '#9ECE6A'
orange = '#E0AF68'
pink = '#F7768E'
purple = '#BB9AF7'
red	= '#F7768E'
yellow = '#E0AF68'

[os]
format = '(fg:current_line)[оӮ¶](fg:red)[$symbol ](fg:primary bg:red)[оӮҙ](fg:red)'
disabled = false

[os.symbols]
Alpine = 'пҢҖ'
Amazon = 'пү°'
Android = 'оңҺ'
Arch = 'пҢғ'
CentOS = 'пҢ„'
Debian = 'пҢҶ'
EndeavourOS = 'пҢў'
Fedora = 'пҢҠ'
FreeBSD = 'пҢҢ'
Garuda = 'п…ј'
Gentoo = 'пҢҚ'
Linux = 'п…ј'
Macos = 'пҢӮ'
Manjaro = 'пҢ’'
Mariner = 'п…ј'
Mint = 'пҢҺ'
NetBSD = 'п…ј'
NixOS = 'пҢ“'
OpenBSD = 'пҢЁ'
OpenCloudOS = 'о®Ә'
openEuler = 'п…ј'
openSUSE = 'пҢ”'
OracleLinux = 'вҠӮвҠғ'
Pop = 'пҢӘ'
Raspbian = 'пҢ•'
Redhat = 'пҢ–'
RedHatEnterprise = 'пҢ–'
Solus = 'пҢӯ'
SUSE = 'пҢ”'
Ubuntu = 'пҢӣ'
Unknown = 'п„Ҳ'
Windows = 'оңҸ'

[directory]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:blue)[у°·Ҹ ](fg:primary bg:blue)[оӮҙ](fg:blue bg:box)[ $read_only$truncation_symbol$path](fg:foreground bg:box)[оӮҙ](fg:box)'
home_symbol = "оӯҶ ~/"
truncation_symbol = 'оҜҹ '
truncation_length = 2
read_only = 'уұ§ө '
read_only_style = ''

[git_branch]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $branch](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оңҘ'
# symbol = 'пҗ— '

[nodejs]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'у°Һҷ Node.js'

[dotnet]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:purple)[$symbol](fg:primary bg:purple)[оӮҙ](fg:purple bg:box)[ $tfm](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оқҝ .NET'

[python]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оңј python'

[java]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:red)[$symbol](fg:primary bg:red)[оӮҙ](fg:red bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оңё Java'

[c]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:blue)[$symbol](fg:primary bg:blue)[оӮҙ](fg:blue bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оҳһ C'

[fill]
symbol = 'в”Җ'
style = 'fg:current_line'

[cmd_duration]
min_time = 500
format = '[в”Җ](fg:current_line)[оӮ¶](fg:orange)[пғ§ ](fg:primary bg:orange)[оӮҙ](fg:orange bg:box)[ $duration ](fg:foreground bg:box)[оӮҙ](fg:box)'

[shell]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:blue)[п’ү ](fg:primary bg:blue)[оӮҙ](fg:blue bg:box)[ $indicator](fg:foreground bg:box)[оӮҙ](fg:box)'
unknown_indicator = 'shell'
powershell_indicator = 'powershell'
fish_indicator = 'fish'
disabled = false

[time]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:purple)[у°Ұ– ](fg:primary bg:purple)[оӮҙ](fg:purple bg:box)[ $time](fg:foreground bg:box)[оӮҙ](fg:box)'
time_format = '%H:%M'
disabled = false

[username]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:yellow)[пҗ• ](fg:primary bg:yellow)[оӮҙ](fg:yellow bg:box)[ $user](fg:foreground bg:box)[оӮҙ](fg:box) '
show_always = true

[character]
format = """
[в•°в”Җ$symbol](fg:current_line) """
success_symbol = '[у°„ҫ](fg:bold white)'
error_symbol = '[Г—](fg:bold red)'
