format = """\
[╭╴](bold cyan)[$os](bold cyan) \
$jobs$username@$hostname$directory$git_branch$git_status$azure$terraform$nix_shell$python$line_break$character"""

palette = 'custom'
add_newline = true

[palettes.custom]
foreground = '#F8F8F2'
background = '#282A36'
current_line = '#44475A'
primary = '#1E1F29'
box = '#44475A'
blue	= '#7AA2F7'
cyan = '#7DCFFF'
green	= '#9ECE6A'
orange = '#E0AF68'
pink = '#F7768E'
purple = '#BB9AF7'
red	= '#F7768E'
yellow = '#ffa066'

[character]
format = """
[╰─$symbol](bold cyan) """
success_symbol = '[󰄾](bold cyan)'
error_symbol = '[󰄾](fg:bold red)'
# success_symbol = "[](bold cyan)"
# error_symbol = "[×](bold red)"

[os]
format = '$symbol'
disabled = false

[os.symbols]
Alpine = ''
Amazon = ''
Android = ''
Arch = ''
CentOS = ''
Debian = ''
EndeavourOS = ''
Fedora = ''
FreeBSD = ''
Garuda = ''
Gentoo = ''
Linux = ''
Macos = ''
Manjaro = ''
Mariner = ''
Mint = ''
NetBSD = ''
NixOS = ''
OpenBSD = ''
OpenCloudOS = ''
openEuler = ''
openSUSE = ''
OracleLinux = '⊂⊃'
Pop = ''
Raspbian = ''
Redhat = ''
RedHatEnterprise = ''
Solus = ''
SUSE = ''
Ubuntu = ''
Unknown = ''
Windows = ''

# Shows the username
[username]
style_user = "foreground bold"
style_root = "black bold"
format = "[$user]($style)"
disabled = false           # disable in powershell
show_always = true

[hostname]
format = "[$hostname]($style) "
style = "bold yellow"
trim_at = "-"
ssh_only = false
disabled = false

[directory]
truncation_length = 3
truncate_to_repo = false
truncation_symbol = "…/"
home_symbol = " "
read_only_style = "197"
read_only = "  "
format = "in [$path]($style)[$read_only]($read_only_style) "

[jobs]
symbol = '󰑮'
style = 'bold red'

[git_branch]
disabled = false
# symbol = " "
symbol = " "
format = "󰇙 [$symbol$branch]($style) "
truncation_length = 20
truncation_symbol = "…/"
style = "bold green"

[git_status]
disabled = true
format = '[\($all_status$ahead_behind\)]($style) '
style = "bold green"
conflicted = "🏳"
up_to_date = " "
untracked = " "
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
stashed = " "
modified = " "
staged = '[++\($count\)](green)'
renamed = "襁 "
deleted = " "

[terraform]
format = "󰇙 [󱁢]($style) [$workspace]($style) "

[vagrant]
format = "󰇙 [ vagrant $version]($style) "

[docker_context]
format = "󰇙 [ $context](bold blue) "

[helm]
format = "󰇙 [ $version](bold purple) "

[python]
symbol = " "
python_binary = "python3"

[nodejs]
format = "󰇙 [ $version](bold green) "
disabled = true

[ruby]
format = "󰇙 [ $version]($style) "

[kubernetes]
format = '󰇙 [ $context\($namespace\)](bold purple) '
disabled = true

[kubernetes.context_aliases]
"clcreative-k8s-staging" = "cl-k8s-staging"
"clcreative-k8s-production" = "cl-k8s-prod"

[golang]
symbol = " "
disabled = true

[nix_shell]
symbol = ' '
format = '󰇙 [$symbol$state$name]($style) '
# symbol = '❄️ '
disabled = false
impure_msg = ''

[azure]
disabled = true
format = '󰇙 [$symbol($subscription)]($style) '
symbol = '󰠅 '
style = 'blue bold'
