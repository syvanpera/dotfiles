[[session]]
name = "hyprland config"
path = "~/.config/hypr"
startup_command = "nvim hyprland.conf"
# preview_command = "bat --color=always ~/.dotfiles/.config/hypr/hyprland.conf"

[[session]]
name = "waybar config"
path = "~/.config/waybar"
startup_command = "nvim -c ':FzfLua files'"
