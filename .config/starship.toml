format = """
[тХнтФА](fg:current_line)\
$os\
$hostname\
$directory\
$git_branch\
$fill\
$nodejs\
$dotnet\
$python\
$java\
$c\
$cmd_duration\
$line_break\
$character\
"""

palette = 'dracula'
add_newline = true

[palettes.dracula]
foreground = '#F8F8F2'
background = '#282A36'
current_line = '#44475A'
primary = '#1E1F29'
box = '#44475A'
blue	= '#7AA2F7'
cyan = '#7DCFFF'
green	= '#9ECE6A'
orange = '#E0AF68'
pink = '#F7768E'
purple = '#BB9AF7'
red	= '#F7768E'
yellow = '#E0AF68'

[os]
format = '(fg:current_line)[юВ╢](fg:red)[$symbol ](fg:primary bg:red)'
disabled = false

[hostname]
format = '[$hostname](fg:primary bg:red)[юВ┤](fg:red)'
style = "bold dimmed green"
trim_at = "-"
ssh_only = false
disabled = false

[os.symbols]
Alpine = 'яМА'
Amazon = 'яЙ░'
Android = 'юЬО'
Arch = 'яМГ'
CentOS = 'яМД'
Debian = 'яМЖ'
EndeavourOS = 'яМв'
Fedora = 'яМК'
FreeBSD = 'яММ'
Garuda = 'яЕ╝'
Gentoo = 'яМН'
Linux = 'яЕ╝'
Macos = 'яМВ'
Manjaro = 'яМТ'
Mariner = 'яЕ╝'
Mint = 'яМО'
NetBSD = 'яЕ╝'
NixOS = 'яМУ'
OpenBSD = 'яМи'
OpenCloudOS = 'юок'
openEuler = 'яЕ╝'
openSUSE = 'яМФ'
OracleLinux = 'тКВтКГ'
Pop = 'яМк'
Raspbian = 'яМХ'
Redhat = 'яМЦ'
RedHatEnterprise = 'яМЦ'
Solus = 'яМн'
SUSE = 'яМФ'
Ubuntu = 'яМЫ'
Unknown = 'яДИ'
Windows = 'юЬП'

[directory]
format = '[тФА](fg:current_line)[юВ╢](fg:blue)[ґ░╖П ](fg:primary bg:blue)[юВ┤](fg:blue bg:box)[ $read_only$truncation_symbol$path](fg:foreground bg:box)[юВ┤](fg:box)'
home_symbol = "юнЖ ~/"
truncation_symbol = 'юпЯ '
truncation_length = 2
read_only = 'ґ▒з╡ '
read_only_style = ''

[git_branch]
format = '[тФА](fg:current_line)[юВ╢](fg:green)[$symbol](fg:primary bg:green)[юВ┤](fg:green bg:box)[ $branch](fg:foreground bg:box)[юВ┤](fg:box)'
symbol = 'юЬе'
# symbol = 'яРЧ '

[nodejs]
format = '[тФА](fg:current_line)[юВ╢](fg:green)[$symbol](fg:primary bg:green)[юВ┤](fg:green bg:box)[ $version](fg:foreground bg:box)[юВ┤](fg:box)'
symbol = 'ґ░ОЩ Node.js'

[dotnet]
format = '[тФА](fg:current_line)[юВ╢](fg:purple)[$symbol](fg:primary bg:purple)[юВ┤](fg:purple bg:box)[ $tfm](fg:foreground bg:box)[юВ┤](fg:box)'
symbol = 'юЭ┐ .NET'

[python]
format = '[тФА](fg:current_line)[юВ╢](fg:green)[$symbol](fg:primary bg:green)[юВ┤](fg:green bg:box)[ $version](fg:foreground bg:box)[юВ┤](fg:box)'
symbol = 'юЬ╝ python'

[java]
format = '[тФА](fg:current_line)[юВ╢](fg:red)[$symbol](fg:primary bg:red)[юВ┤](fg:red bg:box)[ $version](fg:foreground bg:box)[юВ┤](fg:box)'
symbol = 'юЬ╕ Java'

[c]
format = '[тФА](fg:current_line)[юВ╢](fg:blue)[$symbol](fg:primary bg:blue)[юВ┤](fg:blue bg:box)[ $version](fg:foreground bg:box)[юВ┤](fg:box)'
symbol = 'юШЮ C'

[fill]
symbol = 'тФА'
style = 'fg:current_line'

[cmd_duration]
min_time = 500
format = '[тФА](fg:current_line)[юВ╢](fg:orange)[яГз ](fg:primary bg:orange)[юВ┤](fg:orange bg:box)[ $duration ](fg:foreground bg:box)[юВ┤](fg:box)'

[shell]
format = '[тФА](fg:current_line)[юВ╢](fg:blue)[яТЙ ](fg:primary bg:blue)[юВ┤](fg:blue bg:box)[ $indicator](fg:foreground bg:box)[юВ┤](fg:box)'
unknown_indicator = 'shell'
powershell_indicator = 'powershell'
fish_indicator = 'fish'
disabled = false

[time]
format = '[тФА](fg:current_line)[юВ╢](fg:purple)[ґ░жЦ ](fg:primary bg:purple)[юВ┤](fg:purple bg:box)[ $time](fg:foreground bg:box)[юВ┤](fg:box)'
time_format = '%H:%M'
disabled = false

[username]
format = '[тФА](fg:current_line)[юВ╢](fg:yellow)[яРХ ](fg:primary bg:yellow)[юВ┤](fg:yellow bg:box)[ $user](fg:foreground bg:box)[юВ┤](fg:box) '
show_always = true

[character]
format = """
[тХ░тФА$symbol](fg:current_line) """
success_symbol = '[ґ░Д╛](fg:bold white)'
error_symbol = '[├Ч](fg:bold red)'
