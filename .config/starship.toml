green	= '#9ECE6A'
orange = '#E0AF68'
pink = '#F7768E'
purple = '#BB9AF7'
red	= '#F7768E'
yellow = '#E0AF68'

[os]
format = '(fg:current_line)[ţéÂ](fg:yellow)[$symbol ](fg:primary bg:yellow)'
